name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Create venv and install (replykit + subtitle-medic, dev extras)
        # replykit is a sibling package in this monorepo-style layout. Locally and
        # in dev we install it editable from the sibling checkout so the local
        # source is used; in CI (no sibling checkout) we install it from git,
        # because replykit is not yet published to PyPI. Then subtitle-medic
        # itself. The whole suite is hermetic (no network, no live LLM at test
        # time), so no provider SDKs or API keys are needed in CI.
        run: |
          uv venv --python ${{ matrix.python-version }}
          if [ -d "../replykit" ]; then
            uv pip install -e ../replykit
          else
            uv pip install "replykit @ git+https://github.com/edgarh92/replykit@main"
          fi
          uv pip install -e '.[dev]'

      - name: Ruff (lint)
        run: uv run ruff check .

      - name: Ruff (format check)
        run: uv run ruff format --check .

      - name: Pytest
        run: uv run pytest --cov=subtitle_medic --cov-report=term-missing

      - name: Smoke-test the CLI and examples (hermetic)
        run: |
          uv run subtitle-medic --help
          uv run subtitle-medic check examples/sample.srt --json || true
          uv run python examples/check_demo.py
          uv run python examples/fix_demo.py
